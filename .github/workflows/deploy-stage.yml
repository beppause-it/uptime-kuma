# Workflow personalizzato per il deploy automatico su AWS Staging
name: "[DEPLOY] Staging (AWS)"

on:
  push:
    branches:
      - stage

jobs:
  deploy:
    name: Deploy to Stage Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "==> Creating data directory if not exists"
            mkdir -p /home/ubuntu/data-stage

            echo "==> Navigating to app directory"
            cd /home/ubuntu/uptime-kuma-stage

            echo "==> Writing .env config"
            cat > .env <<'EOF'
            UPTIME_KUMA_PORT=3001
            DATA_DIR=/home/ubuntu/data-stage
            AUTH_API_URL=https://api-test0.biolaser.it/api
            EOF

            echo "==> Pulling latest changes from stage branch"
            git pull origin stage

            echo "==> Installing dependencies"
            npm install --no-audit

            echo "==> Building frontend"
            npm run build

            echo "==> Restarting app with PM2 (loading .env)"
            set -a; source .env; set +a
            pm2 restart uptime-kuma-stage --update-env || \
              pm2 start server/server.js --name uptime-kuma-stage --update-env

            echo "==> Deploy to STAGE completed successfully"
