# Workflow personalizzato per il deploy automatico su AWS Staging
name: "[DEPLOY] Staging (AWS)"

on:
  push:
    branches:
      - stage

jobs:
  deploy:
    name: Deploy to Stage Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "==> Creating data directory if not exists "
            mkdir -p /home/ubuntu/data-stage

            echo "==> Navigating to app directory"
            cd /home/ubuntu/uptime-kuma-stage

            echo "==> Creating .env config if not exists"
            if [ ! -f .env ]; then
              echo "UPTIME_KUMA_PORT=3001" > .env
              echo "DATA_DIR=/home/ubuntu/data-stage" >> .env
              echo ".env created"
            else
              echo ".env already exists, skipping"
            fi

            echo "==> Pulling latest changes from stage branch"
            git pull origin stage

            echo "==> Installing dependencies"
            npm install --omit=dev --no-audit

            echo "==> Building frontend"
            npm run build

            echo "==> Restarting app with PM2"
            DATA_DIR=/home/ubuntu/data-stage pm2 restart uptime-kuma-stage || DATA_DIR=/home/ubuntu/data-stage pm2 start server/server.js --name uptime-kuma-stage

            echo "==> Deploy to STAGE completed successfully"
