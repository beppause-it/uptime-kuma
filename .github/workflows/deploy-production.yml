# Workflow personalizzato per il deploy automatico su AWS Production
name: "[DEPLOY] Production (AWS)"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "==> Creating data directory if not exists"
            mkdir -p /home/ubuntu/data-main

            echo "==> Navigating to app directory"
            cd /home/ubuntu/uptime-kuma-main

            echo "==> Writing .env config"
            cat > .env <<'EOF'
            UPTIME_KUMA_PORT=3002
            DATA_DIR=/home/ubuntu/data-main
            AUTH_API_URL=https://api0.biolaser.it/api
            EOF

            echo "==> Pulling latest changes from main branch"
            git pull origin main

            echo "==> Installing dependencies"
            npm install --no-audit

            echo "==> Building frontend"
            npm run build

            echo "==> Restarting app with PM2 (loading .env)"
            set -a; source .env; set +a
            pm2 restart uptime-kuma-main --update-env || \
              pm2 start server/server.js --name uptime-kuma-main --update-env

            echo "==> Deploy to PRODUCTION completed successfully"
