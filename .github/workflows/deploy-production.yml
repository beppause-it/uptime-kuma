# Workflow personalizzato per il deploy automatico su AWS Production
name: "[DEPLOY] Production (AWS)"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "==> Creating data directory if not exists"
            mkdir -p /home/ubuntu/data-main

            echo "==> Navigating to app directory"
            cd /home/ubuntu/uptime-kuma-main

            echo "==> Creating .env config if not exists"
            if [ ! -f .env ]; then
              echo "UPTIME_KUMA_PORT=3002" > .env
              echo "DATA_DIR=/home/ubuntu/data-main" >> .env
              echo ".env created"
            else
              echo ".env already exists, skipping"
            fi

            echo "==> Pulling latest changes from main branch"
            git pull origin main

            echo "==> Installing dependencies"
            npm install --omit=dev --no-audit

            echo "==> Building frontend"
            npm run build

            echo "==> Restarting app with PM2"
            DATA_DIR=/home/ubuntu/data-main pm2 restart uptime-kuma-main || DATA_DIR=/home/ubuntu/data-main pm2 start server/server.js --name uptime-kuma-main

            echo "==> Deploy to PRODUCTION completed successfully"
